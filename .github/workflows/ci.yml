name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: s3ollama-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build development image
        run: docker build -t "$IMAGE_NAME" .

      - name: Run linters inside Docker
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace \
            "$IMAGE_NAME" \
            make lint-local

      - name: Run unit tests inside Docker
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace \
            "$IMAGE_NAME" \
            make test-local

      - name: Check Terraform formatting inside Docker
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace/infrastructure/terraform \
            "$IMAGE_NAME" \
            terraform fmt -check
